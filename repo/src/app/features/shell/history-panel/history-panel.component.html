<div class="history-panel">
  <div class="history-header">
    <h3>History</h3>
    <div class="history-actions">
      <button class="hist-btn" [disabled]="!history.canUndo()" (click)="undo()" title="Undo">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7h8M3 7l3-3M3 7l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="hist-btn" [disabled]="!history.canRedo()" (click)="redo()" title="Redo">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M11 7H3M11 7l-3-3M11 7l-3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="history-list">
    @for (entry of history.visibleEntries(); track entry.id; let i = $index) {
      <div class="history-entry" [class.current]="i === history.pointer()">
        <span class="entry-desc">{{ entry.description }}</span>
        <span class="entry-time">{{ formatTime(entry.timestamp) }}</span>
      </div>
    } @empty {
      <p class="empty-hint">No actions recorded yet.</p>
    }
  </div>
</div>
