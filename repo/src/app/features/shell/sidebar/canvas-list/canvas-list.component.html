<div class="canvas-list">
  <button class="new-canvas-btn" (click)="startCreate()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    New Canvas
  </button>

  @if (creating) {
    <div class="create-form">
      <input
        class="create-input"
        [(ngModel)]="newCanvasName"
        placeholder="Canvas name"
        maxlength="80"
        (keydown.enter)="finishCreate()"
        (keydown.escape)="cancelCreate()"
        autofocus
      />
      <div class="create-actions">
        <button class="action-btn primary" (click)="finishCreate()" [disabled]="!newCanvasName.trim()">Create</button>
        <button class="action-btn" (click)="cancelCreate()">Cancel</button>
      </div>
    </div>
  }

  <div class="list-items">
    @for (canvas of store.canvasList(); track canvas.id) {
      <button
        class="canvas-item"
        [class.active]="isActive(canvas)"
        (click)="openCanvas(canvas)"
      >
        <span class="canvas-name">{{ canvas.name }}</span>
        <span class="canvas-badge" [class.draft]="canvas.status === 'draft'" [class.published]="canvas.status === 'published'">{{ canvas.status }}</span>
      </button>
    } @empty {
      @if (!creating) {
        <p class="empty-hint">No canvases yet. Create one to get started.</p>
      }
    }
  </div>
</div>
